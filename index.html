<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego de Memoria - DOM y Eventos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="contenedor">
    <header>
      <h1>Memoria JS</h1>
      
      <div class="controles">
        <label for="select-dificultad">Dificultad: </label>
        <select id="select-dificultad">
          <option value="facil">Fácil (4 pares)</option>
          <option value="medio">Medio (6 pares)</option>
          <option value="dificil" selected>Difícil (8 pares)</option>
        </select>
      </div>

      <div class="marcador">
        <p>Movimientos actuales: <span id="contador-movimientos">0</span></p>
        <p>Mejor Récord: <span id="record-movimientos">-</span> movimientos</p>
      </div>

      <button id="btn-reiniciar">Reiniciar Juego</button>
    </header>
    
    <div id="tablero" class="tablero"></div>
    
    <div id="mensaje-victoria" class="oculto">
      <h2>¡Has ganado!</h2>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
