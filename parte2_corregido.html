<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego de Memoria — versión auditada y corregida</title>
<style>
  body{font-family:system-ui,sans-serif;max-width:540px;margin:40px auto;padding:0 16px;color:#222}
  h1{font-size:1.4rem}
  .fila{display:flex;gap:8px;margin-bottom:16px}
  input{flex:1;padding:8px 10px;font-size:1rem;border:1px solid #bbb;border-radius:6px}
  button{padding:8px 12px;font-size:1rem;cursor:pointer;border:1px solid #888;border-radius:6px;background:#f3f3f3}
  #tablero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:8px}
  .carta{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;background:#2b3a42;color:#fff;border-radius:10px;cursor:pointer;user-select:none}
  .carta.volteada{background:#e8eef0;color:#222}
  .carta.encontrada{background:#cdebd7;color:#222;cursor:default}
  #movimientos{color:#666;font-size:.9rem;margin-top:14px}
  #mensaje{font-size:1.1rem;font-weight:600;margin-top:8px}
</style>
</head>
<body>
<h1>Juego de Memoria (Auditado)</h1>

<div class="fila">
  <input id="nombre" placeholder="Tu nombre...">
  <button id="iniciar">Iniciar / Reiniciar</button>
</div>

<div id="tablero"></div>
<p id="movimientos"></p>
<p id="mensaje"></p>

<script>
  const EMOJIS = ['🍎', '🚀', '🐱', '🌵', '🎲', '🎧', '⚽', '🍕']; // 8 pares = 16 cartas

  let cartas = [];      
  let volteadas = [];   
  let movimientos = 0;
  let nombre = '';
  
  // FIX: (Funcional) Añadimos una bandera de estado para manejar el bloqueo del tablero
  let bloqueado = false; 

  const tablero = document.getElementById('tablero');

  document.getElementById('iniciar').addEventListener('click', function () {
    nombre = document.getElementById('nombre').value;
    cartas = [];
    EMOJIS.forEach(function (e) {
      cartas.push({ emoji: e, encontrada: false });
      cartas.push({ emoji: e, encontrada: false });
    });
    cartas.sort(function () { return Math.random() - 0.5; });
    volteadas = [];
    movimientos = 0;
    bloqueado = false; // Reiniciamos el bloqueo
    document.getElementById('mensaje').textContent = '';
    render();
  });

  function render() {
    tablero.innerHTML = '';
    for (let i = 0; i < cartas.length; i++) {
      const div = document.createElement('div');
      div.className = 'carta';
      div.dataset.indice = i;
      div.textContent = cartas[i].encontrada ? cartas[i].emoji : '?';
      
      // BUG: (Arquitectura / Rendimiento) Adjuntar un listener por cada carta dentro del bucle de renderizado es costoso en memoria y mala práctica, especialmente si el DOM se regenera.
      // FIX: Comentamos/Eliminamos el listener individual e implementamos Delegación de Eventos en el contenedor padre (#tablero) más abajo.
      /*
      div.addEventListener('click', function () {
        voltearCarta(div);
      });
      */
      
      tablero.appendChild(div);
    }
    document.getElementById('movimientos').textContent = 'Movimientos: ' + movimientos;
  }

  // FIX: (Arquitectura) Implementación de Delegación de Eventos
  tablero.addEventListener('click', function(e) {
    const cartaClickeada = e.target.closest('.carta');
    if (cartaClickeada) {
      voltearCarta(cartaClickeada);
    }
  });

  function voltearCarta(div) {
    const i = Number(div.dataset.indice);

    // BUG: (Funcional) El código permitía hacer doble clic en la misma carta (asignándose como par de sí misma) y no bloqueaba el tablero, permitiendo voltear 3 o más cartas rápidamente, rompiendo la asincronía del setTimeout.
    // FIX: Cláusula de guarda. Si el tablero está bloqueado, o la carta ya está volteada, o ya fue encontrada, la función se detiene.
    if (bloqueado || volteadas.includes(i) || cartas[i].encontrada) {
      return;
    }

    div.textContent = cartas[i].emoji;
    div.classList.add('volteada');
    volteadas.push(i);

    if (volteadas.length === 2) {
      movimientos++;
      document.getElementById('movimientos').textContent = 'Movimientos: ' + movimientos;

      const a = volteadas[0];
      const b = volteadas[1];
      const divs = tablero.children;

      // BUG: (Arquitectura) La comparación de victoria (saber si son iguales) leía el contenido textual del DOM ('divs[a].textContent'). El DOM nunca debe ser la fuente de verdad.
      // FIX: La lógica de negocio debe consultar el estado de los datos (arreglo 'cartas').
      if (cartas[a].emoji === cartas[b].emoji) {
        cartas[a].encontrada = true;
        cartas[b].encontrada = true;
        divs[a].classList.add('encontrada');
        divs[b].classList.add('encontrada');
        volteadas = [];
        revisarVictoria();
      } else {
        // Activamos el bloqueo antes del setTimeout para evitar clics concurrentes
        bloqueado = true; 
        setTimeout(function () {
          divs[a].textContent = '?';
          divs[b].textContent = '?';
          divs[a].classList.remove('volteada');
          divs[b].classList.remove('volteada');
          volteadas = [];
          
          // Liberamos el tablero al terminar la animación
          bloqueado = false; 
        }, 800);
      }
    }
  }

  function revisarVictoria() {
    const todasEncontradas = cartas.every(function (c) { return c.encontrada; });
    if (todasEncontradas) {
      // BUG: (Seguridad) Uso de 'innerHTML' concatenando directamente el input del usuario ('nombre'). Esto permitía inyección de código (XSS).
      // FIX: Usamos 'textContent' para obligar al navegador a tratar el contenido del input estrictamente como texto plano, sanitizando la salida.
      document.getElementById('mensaje').textContent = '¡Ganaste, ' + nombre + '! 🎉';
    }
  }
</script>
</body>
</html>
